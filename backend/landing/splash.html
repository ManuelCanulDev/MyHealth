<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyHealth</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(160deg, #f0fdfa 0%, #e6fffa 45%, #ccfbf1 100%);
        color: #134e4a;
      }
      .panel {
        text-align: center;
        padding: 2.5rem 2rem;
        max-width: 22rem;
      }
      .logo {
        width: min(200px, 70vw);
        height: auto;
        display: block;
        margin: 0 auto 2rem;
        filter: drop-shadow(0 4px 12px rgba(15, 118, 110, 0.15));
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
      }
      a.btn {
        display: inline-block;
        padding: 0.75rem 1.25rem;
        border-radius: 999px;
        font-weight: 600;
        font-size: 0.95rem;
        text-decoration: none;
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }
      a.btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(13, 148, 136, 0.25);
      }
      a.btn-primary {
        background: #0d9488;
        color: #fff;
      }
      a.btn-secondary {
        background: #fff;
        color: #0f766e;
        border: 2px solid #5eead4;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <img
        class="logo"
        src="/landing/myhealth_logo.png"
        width="200"
        height="200"
        alt="MyHealth"
      />
      <div class="actions">
        <a class="btn btn-primary" href="{{FRONTEND_URL}}" rel="noopener noreferrer"
          >Ir a la aplicación</a
        >
        <a class="btn btn-secondary" href="/docs">Documentación de la API</a>
      </div>
    </div>
  </body>
</html>
