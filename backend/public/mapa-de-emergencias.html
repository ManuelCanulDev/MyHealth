<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0d9488" />
  <meta name="api-base" content="" />
  <title>Mapa de monitoreo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" crossorigin="" />
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
  <style>
    .mapa-emergencias #map {
      position: relative;
      width: 100%;
      min-height: calc(100vh - 7.5rem);
    }
    .mapa-emergencias .maplibregl-ctrl,
    .mapa-emergencias .maplibregl-ctrl a {
      font-family: "DM Sans", system-ui, sans-serif;
    }
    @keyframes emg-ping {
      0% {
        transform: scale(0.65);
        opacity: 0.85;
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.8);
      }
      70%,
      100% {
        transform: scale(1.45);
        opacity: 0;
        box-shadow: 0 0 0 22px rgba(239, 68, 68, 0);
      }
    }
    @keyframes emg-blink {
      0%,
      100% {
        opacity: 1;
        filter: drop-shadow(0 0 8px #fecaca) brightness(1.1);
      }
      50% {
        opacity: 0.55;
        filter: drop-shadow(0 0 4px #991b1b) brightness(0.75);
      }
    }
    @keyframes emg-bounce-pin {
      0%,
      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      20% {
        transform: translate3d(0, -12px, 0) scale(1.08);
      }
      40% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      60% {
        transform: translate3d(0, -6px, 0) scale(1.04);
      }
    }
    @keyframes emg-flash-aura {
      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(254, 202, 202, 0.9);
      }
      50% {
        box-shadow: 0 0 24px 8px rgba(220, 38, 38, 0.55);
      }
    }
    @keyframes emg-siren {
      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(1.08);
      }
    }
    @keyframes emg-backdrop-urgent {
      0%,
      100% {
        background: rgba(69, 10, 10, 0.75);
      }
      50% {
        background: rgba(127, 29, 29, 0.6);
      }
    }
    @keyframes emg-modal-breathe {
      0%,
      100% {
        box-shadow: 0 0 0 1px rgba(220, 38, 38, 0.5), 0 20px 50px -10px rgba(127, 29, 29, 0.45);
      }
      50% {
        box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.6), 0 24px 60px -8px rgba(220, 38, 38, 0.55);
      }
    }
    .emg-marker-wrap {
      position: relative;
      width: 5rem;
      height: 5.5rem;
      pointer-events: none;
    }
    .emg-marker-ground {
      position: absolute;
      left: 50%;
      bottom: 0.15rem;
      width: 3.25rem;
      height: 3.25rem;
      margin-left: -1.625rem;
    }
    .emg-marker-ping,
    .emg-marker-ping--2,
    .emg-marker-ping--3 {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2.5rem;
      height: 2.5rem;
      margin: -1.25rem 0 0 -1.25rem;
      border-radius: 9999px;
      background: rgba(220, 38, 38, 0.25);
      border: 2px solid #ef4444;
    }
    .emg-marker-ping {
      animation: emg-ping 1.4s ease-out infinite;
    }
    .emg-marker-ping--2 {
      animation: emg-ping 1.4s ease-out 0.35s infinite;
    }
    .emg-marker-ping--3 {
      animation: emg-ping 1.4s ease-out 0.7s infinite;
    }
    .emg-marker-bounce {
      position: absolute;
      left: 50%;
      bottom: 0.35rem;
      width: 3rem;
      height: 3.75rem;
      margin-left: -1.5rem;
      z-index: 3;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: emg-bounce-pin 0.7s ease-in-out infinite;
    }
    .emg-marker-pin {
      width: 2.6rem;
      height: 2.6rem;
      color: #b91c1c;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4)) drop-shadow(0 0 6px rgba(252, 165, 165, 0.9));
      animation: emg-blink 0.4s step-end infinite;
    }
    .emg-marker-core {
      position: absolute;
      left: 50%;
      bottom: 0.1rem;
      width: 1.1rem;
      height: 1.1rem;
      margin-left: -0.55rem;
      border-radius: 9999px;
      background: radial-gradient(circle at 35% 35%, #fecaca, #b91c1c 55%, #7f1d1d);
      border: 2px solid #fff;
      animation: emg-flash-aura 0.45s ease-in-out infinite;
      z-index: 1;
    }
    .emg-modal-back {
      animation: emg-backdrop-urgent 1.1s ease-in-out infinite;
    }
    .emg-modal-card {
      animation: emg-modal-breathe 1.4s ease-in-out infinite;
    }
    .emg-siren-ico {
      animation: emg-siren 0.6s ease-in-out infinite;
    }
  </style>
</head>
<body class="mapa-emergencias h-full min-h-screen bg-slate-100 font-sans text-slate-900">
  <header class="sticky top-0 z-[200] border-b border-slate-200/80 bg-white/95 pt-[env(safe-area-inset-top,0px)] backdrop-blur-md">
    <div
      class="mx-auto flex w-full max-w-7xl flex-col gap-3 px-3 py-3 sm:flex-row sm:items-center sm:justify-between sm:gap-x-6 sm:px-6 sm:py-4 lg:px-8"
    >
      <nav
        class="flex min-w-0 flex-wrap items-center gap-x-1.5 gap-y-0.5 text-xs leading-snug text-slate-800 sm:gap-x-2 sm:gap-y-1 sm:text-sm md:text-base"
        aria-label="Migas"
      >
        <a
          href="/"
          class="inline-flex min-h-11 min-w-0 max-w-full items-center gap-1.5 font-semibold tracking-tight text-slate-900 sm:min-h-0 sm:gap-2 sm:pr-0.5 sm:text-lg"
        >
          <i data-lucide="activity" class="h-5 w-5 shrink-0 text-brand-600 sm:h-6 sm:w-6" aria-hidden="true"></i>
          <span class="truncate">MyHealth</span>
        </a>
        <span class="shrink-0 select-none px-0.5 text-slate-300 sm:px-1.5" aria-hidden="true">|</span>
        <span
          class="min-w-0 pl-0.5 font-semibold leading-tight text-brand-800 sm:max-w-none"
          aria-current="page"
        >
          Mapa de monitoreo
        </span>
      </nav>
      <nav class="flex w-full min-w-0 sm:w-auto sm:justify-end" aria-label="Acciones">
        <a
          href="/"
          class="inline-flex min-h-11 w-full min-w-0 items-center justify-center gap-1.5 rounded-full border border-slate-200 bg-white px-3 py-2.5 text-sm font-medium text-slate-700 shadow-sm touch-manipulation transition active:bg-slate-50 hover:border-brand-300 hover:bg-brand-50/50 sm:min-h-0 sm:w-auto sm:px-3.5 sm:py-1.5"
        >
          Inicio
        </a>
      </nav>
    </div>
  </header>

  <div id="mapStatus" class="mx-auto min-h-0 max-w-7xl px-4 py-1 sm:px-6 sm:py-0.5 lg:px-8" role="status" aria-live="polite">
    <p id="mapStatusText" class="min-h-0 text-sm text-slate-600 empty:hidden"></p>
  </div>
  <div id="map" class="w-full overflow-hidden rounded-none border-y border-slate-200/80 shadow-inner sm:mx-auto sm:max-w-7xl sm:rounded-2xl sm:border sm:shadow-lg" aria-label="Mapa tridimensional"></div>

  <p class="mx-auto max-w-7xl px-4 py-3 text-center text-[0.65rem] text-slate-400 sm:px-6">
    <a href="https://maplibre.org/" class="hover:text-slate-600" target="_blank" rel="noopener">MapLibre GL</a>
    ·
    <a href="https://www.openstreetmap.org/copyright" class="underline decoration-slate-300 underline-offset-2 hover:text-slate-600" target="_blank" rel="noopener">OpenStreetMap</a>
  </p>

  <div
    id="emergenciaModal"
    class="fixed inset-0 z-[500] hidden items-center justify-center p-4"
    role="alertdialog"
    aria-modal="true"
    aria-labelledby="emgModalTitle"
    aria-describedby="emgModalDetalle"
  >
    <div class="emg-modal-back absolute inset-0 backdrop-blur-[2px]" data-emg-close="backdrop"></div>
    <div
      class="emg-modal-card relative z-[1] w-full max-w-md overflow-hidden rounded-2xl border-2 border-red-500/80 bg-white"
    >
      <div class="emg-siren-stripe flex items-center gap-3 border-b-2 border-red-600/30 bg-gradient-to-r from-red-600 via-rose-600 to-red-700 px-4 py-3 sm:px-5 sm:py-4">
        <div class="emg-siren-ico flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-red-950/40 ring-2 ring-amber-300/70" aria-hidden="true">
          <svg class="h-7 w-7 text-amber-100" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path
              d="M12 1.6L1.1 20.9h21.8L12 1.6zM5.4 18.1L12 4.1l6.6 14H5.4zM12 7.2a1.2 1.2 0 0 0-1.2 1.2V13a1.2 1.2 0 0 0 2.4 0V8.4a1.2 1.2 0 0 0-1.2-1.2zm0 7.1a1.1 1.1 0 1 0 0 2.2 1.1 1.1 0 0 0 0-2.2z"
            />
          </svg>
        </div>
        <div class="min-w-0">
          <p class="emg-siren-label text-[0.7rem] font-extrabold uppercase tracking-[0.2em] text-amber-100/95">
            Emergencia activa
          </p>
          <h2 id="emgModalTitle" class="mt-0.5 text-lg font-extrabold leading-tight text-white drop-shadow sm:text-xl"></h2>
        </div>
      </div>
      <div class="emg-body bg-gradient-to-b from-red-50/90 to-white px-5 py-4">
        <p class="text-xs font-semibold uppercase tracking-wide text-red-800/90">Requiere atención inmediata</p>
        <p id="emgModalDetalle" class="emg-text mt-2 text-sm font-medium leading-relaxed text-slate-800 sm:text-base"></p>
      </div>
      <div class="flex flex-col gap-2 border-t border-rose-200/80 bg-rose-50/50 px-5 py-4 sm:flex-row sm:justify-end">
        <button
          type="button"
          id="emgModalVolver"
          class="inline-flex justify-center rounded-full border border-brand-200 bg-brand-50/80 px-4 py-2.5 text-sm font-medium text-brand-900 shadow-sm hover:bg-brand-100"
        >
          Volver a mi monitoreo
        </button>
        <button
          type="button"
          id="emgModalEntendido"
          class="inline-flex justify-center rounded-full border border-slate-200 bg-white px-4 py-2.5 text-sm font-medium text-slate-800 shadow-sm hover:bg-slate-50"
        >
          Entendido
        </button>
        <button
          type="button"
          id="emgModalResolver"
          class="inline-flex justify-center rounded-full bg-rose-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-rose-700"
        >
          Marcar resuelto (API)
        </button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js" crossorigin=""></script>
  <script>
    (function () {
      if (typeof lucide !== "undefined" && lucide.createIcons) {
        lucide.createIcons();
      }
      const statusEl = document.getElementById("mapStatusText");
      const FLY_EMERG_MS = 850;
      const POLL_MS = 1200;

      function withApiBase(p) {
        if (typeof p !== "string" || !p.startsWith("/")) return p;
        const meta = document.querySelector('meta[name="api-base"]');
        const b = (meta && meta.getAttribute("content") || "").trim();
        if (!b) return p;
        return b.replace(/\/$/, "") + p;
      }

      function setStatus(msg) {
        if (statusEl) statusEl.textContent = msg;
      }

      /** Radios en metros: ondas / sonar concéntricos (100 m es el anillo exterior) */
      const SONAR_RADII_M = [25, 50, 75, 100];
      const ZONE_RING_STEPS = 72;

      function offsetLngLat(lng, lat, northM, eastM) {
        const c = Math.max(0.2, Math.cos((lat * Math.PI) / 180));
        const dLat = northM / 111320;
        const dLng = eastM / (111320 * c);
        return { lng: lng + dLng, lat: lat + dLat };
      }

      function pointOnRing(lng, lat, radiusM, angleRad) {
        const north = radiusM * Math.cos(angleRad);
        const east = radiusM * Math.sin(angleRad);
        return offsetLngLat(lng, lat, north, east);
      }

      function ringLineString(lng, lat, radiusM) {
        const c = [];
        for (var i = 0; i <= ZONE_RING_STEPS; i++) {
          var a = (i / ZONE_RING_STEPS) * Math.PI * 2;
          var p = pointOnRing(lng, lat, radiusM, a);
          c.push([p.lng, p.lat]);
        }
        return c;
      }

      const osmStyle = {
        version: 8,
        sources: {
          osm: {
            type: "raster",
            tiles: [
              "https://a.tile.openstreetmap.org/{z}/{x}/{y}.png",
              "https://b.tile.openstreetmap.org/{z}/{x}/{y}.png",
              "https://c.tile.openstreetmap.org/{z}/{x}/{y}.png",
            ],
            tileSize: 256,
            attribution:
              '© <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a>',
            maxzoom: 19,
          },
        },
        layers: [{ id: "osm", type: "raster", source: "osm", minzoom: 0, maxzoom: 19 }],
      };

      const map = new maplibregl.Map({
        container: "map",
        style: osmStyle,
        center: [0, 20],
        zoom: 2,
        pitch: 0,
        bearing: 0,
        minZoom: 1,
        maxZoom: 19,
        maxPitch: 85,
      });

      map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), "top-right");
      if (maplibregl.GlobeControl) {
        map.addControl(new maplibregl.GlobeControl(), "top-right");
      }

      let rafId = null;
      let centerLng = 0;
      let centerLat = 0;
      let cameraBearing = 0;
      /** Más bajo = giro de cámara más lento alrededor de tu ubicación */
      const CAMERA_ORBIT = 0.065;
      let orbitaActiva = true;
      let pendingGps = null;

      function updateUser(lng, lat) {
        if (!map.getSource("user") || !map.getSource("sonar")) return;
        map.getSource("user").setData({
          type: "Feature",
          properties: {},
          geometry: { type: "Point", coordinates: [lng, lat] },
        });
        var feats = [];
        for (var si = 0; si < SONAR_RADII_M.length; si++) {
          feats.push({
            type: "Feature",
            properties: { ring: String(si) },
            geometry: { type: "LineString", coordinates: ringLineString(lng, lat, SONAR_RADII_M[si]) },
          });
        }
        map.getSource("sonar").setData({ type: "FeatureCollection", features: feats });
      }

      let emgMarker = null;
      let idModalCerradaPara = null;
      const idsVueloHecho = new Set();
      let ultimaAlertaApi = null;
      let pollTimer = null;

      function tick3d() {
        if (!orbitaActiva) return;
        cameraBearing += CAMERA_ORBIT;
        if (cameraBearing >= 360) cameraBearing -= 360;
        map.setBearing(cameraBearing);
        var t = Date.now() / 800;
        for (var w = 0; w < SONAR_RADII_M.length; w++) {
          if (!map.getLayer("sonar-line-" + w)) continue;
          var ph = t + w * 1.1;
          var o = 0.15 + 0.72 * Math.abs(Math.sin(ph));
          try {
            map.setPaintProperty("sonar-line-" + w, "line-opacity", o);
            map.setPaintProperty("sonar-line-" + w, "line-width", 2.2 + 0.4 * Math.abs(Math.sin(ph + 0.4)));
          } catch (e) {}
        }
        rafId = requestAnimationFrame(tick3d);
      }

      function reanudarOrbita() {
        orbitaActiva = true;
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(tick3d);
      }

      function pausarOrbita() {
        orbitaActiva = false;
        if (rafId) {
          cancelAnimationFrame(rafId);
          rafId = null;
        }
      }

      function quitarMarcaEmg() {
        if (emgMarker) {
          emgMarker.remove();
          emgMarker = null;
        }
      }

      function ponerMarcaEmg(lng, lat) {
        quitarMarcaEmg();
        const wrap = document.createElement("div");
        wrap.className = "emg-marker-wrap";
        wrap.setAttribute("role", "img");
        wrap.setAttribute("aria-label", "Ubicación de emergencia, prioridad crítica");

        const ground = document.createElement("div");
        ground.className = "emg-marker-ground";
        const r1 = document.createElement("div");
        r1.className = "emg-marker-ping";
        const r2 = document.createElement("div");
        r2.className = "emg-marker-ping--2";
        const r3 = document.createElement("div");
        r3.className = "emg-marker-ping--3";
        ground.appendChild(r1);
        ground.appendChild(r2);
        ground.appendChild(r3);

        const core = document.createElement("div");
        core.className = "emg-marker-core";
        core.setAttribute("aria-hidden", "true");

        const bounce = document.createElement("div");
        bounce.className = "emg-marker-bounce";
        bounce.setAttribute("aria-hidden", "true");
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("class", "emg-marker-pin");
        svg.setAttribute("viewBox", "0 0 24 24");
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("fill", "currentColor");
        path.setAttribute(
          "d",
          "M12 2C8.14 2 5 5.14 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.86-3.14-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"
        );
        svg.appendChild(path);
        bounce.appendChild(svg);

        wrap.appendChild(ground);
        wrap.appendChild(core);
        wrap.appendChild(bounce);

        emgMarker = new maplibregl.Marker({ element: wrap, anchor: "bottom" })
          .setLngLat([lng, lat])
          .addTo(map);
      }

      const modal = document.getElementById("emergenciaModal");
      const elTitulo = document.getElementById("emgModalTitle");
      const elDetalle = document.getElementById("emgModalDetalle");

      function abrirModalEmergencia(nombre, detalle) {
        if (elTitulo) {
          elTitulo.textContent = nombre
            ? nombre + " tiene una emergencia"
            : "Se ha recibido una emergencia";
        }
        if (elDetalle) {
          elDetalle.textContent = detalle
            ? detalle
            : "Ubicación mostrada en el mapa. Coordina la respuesta según protocolo.";
        }
        if (modal) {
          modal.classList.remove("hidden");
          modal.classList.add("flex");
        }
      }

      function cerrarModalSoloVista() {
        if (modal) {
          modal.classList.add("hidden");
          modal.classList.remove("flex");
        }
      }

      function reaccionarEmergencia(a, mostrarModal) {
        if (!a || !a.id) return;
        ponerMarcaEmg(a.lng, a.lat);
        if (!idsVueloHecho.has(a.id)) {
          pausarOrbita();
          idsVueloHecho.add(a.id);
          map.flyTo({
            center: [a.lng, a.lat],
            zoom: 17,
            pitch: 62,
            duration: FLY_EMERG_MS,
            essential: true,
            curve: 1.5,
            speed: 1.65,
          });
        }
        if (mostrarModal) {
          abrirModalEmergencia(a.nombrePaciente, a.detalle);
        }
      }

      function fetchJSON(u, o) {
        return fetch(u, {
          headers: { "Content-Type": "application/json" },
          ...o,
        }).then(function (r) {
          return r.text().then(function (t) {
            var j;
            try {
              j = JSON.parse(t);
            } catch (e) {
              throw new Error(t || "Respuesta no JSON");
            }
            if (!r.ok) throw new Error((j && j.error) || r.statusText);
            return j;
          });
        });
      }

      function aplicarEstadoDesdeApi(d) {
        if (!d.activa) {
          quitarMarcaEmg();
          ultimaAlertaApi = null;
          return;
        }
        ultimaAlertaApi = d;
        const mostrarModal = d.id && d.id !== idModalCerradaPara;
        reaccionarEmergencia(d, mostrarModal);
      }

      function volverAMiMonitoreo() {
        if (ultimaAlertaApi && ultimaAlertaApi.id) {
          idModalCerradaPara = ultimaAlertaApi.id;
        }
        map.flyTo({
          center: [centerLng, centerLat],
          zoom: 16,
          pitch: 70,
          duration: 1400,
          essential: true,
        });
        setTimeout(reanudarOrbita, 1450);
      }

      function resolverEmergenciaEnServidor() {
        fetchJSON(withApiBase("/api/mapa-de-emergencias/alerta"), { method: "DELETE" })
          .then(function () {
            quitarMarcaEmg();
            cerrarModalSoloVista();
            idModalCerradaPara = null;
            ultimaAlertaApi = null;
            idsVueloHecho.clear();
            map.flyTo({
              center: [centerLng, centerLat],
              zoom: 16,
              pitch: 70,
              duration: 1200,
              essential: true,
            });
            setTimeout(reanudarOrbita, 1300);
          })
          .catch(function (e) {
            setStatus("No se pudo marcar resuelto: " + (e && e.message));
          });
      }

      document.getElementById("emgModalVolver").addEventListener("click", function () {
        cerrarModalSoloVista();
        volverAMiMonitoreo();
      });
      document.getElementById("emgModalEntendido").addEventListener("click", function () {
        if (ultimaAlertaApi && ultimaAlertaApi.id) {
          idModalCerradaPara = ultimaAlertaApi.id;
        }
        cerrarModalSoloVista();
      });
      document.getElementById("emgModalResolver").addEventListener("click", resolverEmergenciaEnServidor);
      var modalRoot = document.getElementById("emergenciaModal");
      if (modalRoot) {
        modalRoot.addEventListener("click", function (ev) {
          if (ev.target && ev.target.getAttribute("data-emg-close") === "backdrop") {
            if (ultimaAlertaApi && ultimaAlertaApi.id) {
              idModalCerradaPara = ultimaAlertaApi.id;
            }
            cerrarModalSoloVista();
          }
        });
      }

      map.on("style.load", function onStyle() {
        try {
          if (map.setProjection) {
            map.setProjection({ type: "globe" });
          }
        } catch (e) {}
        map.off("style.load", onStyle);
      });

      function beginScene(lng, lat) {
        centerLng = lng;
        centerLat = lat;
        cameraBearing = 0;
        map.jumpTo({ center: [lng, lat], zoom: 16, pitch: 70, bearing: 0 });
        try {
          if (map.setProjection) {
            map.setProjection({ type: "globe" });
          }
        } catch (e) {}
        updateUser(lng, lat);
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(tick3d);
        setTimeout(function () {
          try {
            map.resize();
          } catch (e) {}
        }, 200);
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(function () {
          fetchJSON(withApiBase("/api/mapa-de-emergencias/alerta"), { method: "GET" })
            .then(aplicarEstadoDesdeApi)
            .catch(function () {});
        }, POLL_MS);
      }

      function onErrorGeo() {
        setStatus("Sin GPS: prueba con permiso o HTTPS. Mapa 3D en CDMX; API de emergencia igualmente activa.");
        beginScene(-99.1332, 19.4326);
      }

      map.on("load", function () {
        try {
          if (map.setProjection) {
            map.setProjection({ type: "globe" });
          }
        } catch (e) {}

        map.addSource("sonar", { type: "geojson", data: { type: "FeatureCollection", features: [] } });
        map.addSource("user", { type: "geojson", data: { type: "FeatureCollection", features: [] } });
        for (var li = 0; li < SONAR_RADII_M.length; li++) {
          var dashPats = [
            [1, 1.5],
            [1.2, 2],
            [0.6, 1.4],
            [1.5, 1.8],
          ];
          map.addLayer({
            id: "sonar-line-" + li,
            type: "line",
            source: "sonar",
            filter: ["==", ["get", "ring"], String(li)],
            layout: { "line-cap": "round", "line-join": "round", "line-pitch-alignment": "map" },
            paint: {
              "line-color": li < 2 ? "rgba(94, 234, 212, 0.98)" : "rgba(45, 212, 191, 0.92)",
              "line-width": 2.6,
              "line-opacity": 0.6,
              "line-blur": 0.5,
              "line-dasharray": dashPats[li],
            },
          });
        }
        map.addLayer({
          id: "user-dot",
          type: "circle",
          source: "user",
          paint: {
            "circle-radius": 11,
            "circle-color": "#14b8a6",
            "circle-stroke-color": "#0f766e",
            "circle-stroke-width": 2,
          },
        });
        if (pendingGps) {
          var pg = pendingGps;
          pendingGps = null;
          updateUser(pg.lng, pg.lat);
        }

        if (!navigator.geolocation) {
          onErrorGeo();
          return;
        }
        navigator.geolocation.getCurrentPosition(
          function (pos) {
            beginScene(pos.coords.longitude, pos.coords.latitude);
          },
          onErrorGeo,
          { enableHighAccuracy: true, maximumAge: 30000, timeout: 15000 }
        );
      });

      var watchId = null;
      if (navigator.geolocation) {
        watchId = navigator.geolocation.watchPosition(
          function (pos) {
            centerLng = pos.coords.longitude;
            centerLat = pos.coords.latitude;
            if (map.getSource("user")) {
              updateUser(centerLng, centerLat);
            } else {
              pendingGps = { lng: centerLng, lat: centerLat };
            }
          },
          function () {},
          { enableHighAccuracy: true, maximumAge: 10000, timeout: 20000 }
        );
      }
      window.addEventListener("beforeunload", function () {
        if (rafId) cancelAnimationFrame(rafId);
        if (pollTimer) clearInterval(pollTimer);
        if (typeof watchId === "number") navigator.geolocation.clearWatch(watchId);
      });
    })();
  </script>
</body>
</html>
